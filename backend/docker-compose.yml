services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gloving
      POSTGRES_PASSWORD: gloving
      POSTGRES_DB: gloving
    ports:
      - "55432:5432"
    volumes:
      - gloving-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gloving -d gloving"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gloving-postgres:
